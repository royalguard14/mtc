{% extends "layouts/layout1.html" %}
{% block content %}

<section class="col-lg-12 connectedSortable">
  <div class="card card-info shadow">
    
    <div class="card-header">
      <h3 class="card-title">Register Accussed</h3>
    </div>

    <form method="POST" action="{{ url_for('criminals.save_person') }}">
      
      <div class="card-body">

        <input type="hidden" name="CASEID" value="{{ case_id }}">

        <!-- NAME SECTION -->
        <div class="row">
          <div class="form-group col-md-4">
            <label>First Name</label>
            <input type="text" name="FNAME" class="form-control" required>
          </div>

          <div class="form-group col-md-4">
            <label>Middle Name</label>
            <input type="text" name="MNAME" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Last Name</label>
            <input type="text" name="LNAME" class="form-control" required>
          </div>
        </div>

        <div class="row">

          <div class="form-group col-md-4">
            <label>Alias Name</label>
            <input type="text" name="ANAME" class="form-control">
          </div>

               <div class="form-group col-md-4">
            <label>Age in the time of Commision of Crime</label>
            <input type="Number" name="AGECOMIT" class="form-control" min="0" max="80" value="0">
          </div>

          <div class="form-group col-md-4">
  <label>Person Status</label>
  <select name="PSTATUS" class="form-control">
    <option value="">Select Status</option>

    {% for n in pStatus %}
      <option value="{{ n }}" {% if n == 'AT-LARGE' %}selected{% endif %}>{{ n }}</option>
    {% endfor %}

  </select>
</div>
        </div>

        <!-- PERSONAL INFO -->
        <div class="row">
          <div class="form-group col-md-4">
            <label>Date of Birth</label>
            <input type="date" name="DBIRTH" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Gender</label>
            <select name="GENDER" class="form-control">
              <option value="">Select</option>
              <option value="M">Male</option>
              <option value="F">Female</option>
            </select>
          </div>

          <div class="form-group col-md-4">
            <label>Contact Number</label>
            <input type="text" name="TELNO" class="form-control">
          </div>
        </div>

        <!-- ADDRESS -->
     <div class="form-group">
  <label>Address Line 1</label>
  <textarea 
    name="ADDRESS1" 
    class="form-control" 
    rows="4" 
    style="resize: none; overflow: hidden;"
  ></textarea>
</div>



      </div>

      <!-- FOOTER -->
      <div class="card-footer">
        <button type="submit" class="btn btn-success btn-block">
          <i class="fas fa-save"></i> Save Person
        </button>
      </div>

    </form>
  </div>
</section>

{% endblock %}
