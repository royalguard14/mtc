{% extends "layouts/layout1.html" %}
{% block content %}
<section class="col-lg-12">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">Add Criminal Case</h3>
      <div class="card-tools">
        <a href="/cc" class="btn btn-outline-dark btn-block"><i class="fas fa-arrow-left"></i> Add Back</a>
      </div>
    </div>
    <div class="card-body">
      <form method="POST" action="/cc/add-case">
        <div class="row">
          <div class="col-md-3">
            <div class="form-group">
              <label>Case Number</label>
              <input type="text" name="CASENUM" class="form-control" required>
            </div>
          </div>
          <div class="col-md-9">
            <div class="form-group">
              <label>Case Title</label>
              <input type="text" name="CASETITLE" class="form-control" required value="People of the Philippines vs. ">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Date Case Filed with OCC</label><code> *For Multiple Salas</code>
              <input type="date" name="DTFILED" class="form-control">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Date Case Received by the Branch</label>
              <input type="date" name="DTRECEIVED" class="form-control">
            </div>
          </div>
        </div>
        <hr>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label>Case Category</label>
              <select class="form-control" disabled>
                {% for n in case_cat %}
                <option value="{{ n.CODEID }}" {% if n.CODEID == '00005' %}selected{% endif %}>
                  {{ n.DESCRP }}
                </option>
                {% endfor %}
              </select>
              <!-- Hidden input (this is what gets submitted) -->
              <input type="hidden" name="CATEGORY" value="5">
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Nature of Case</label>
              <select name="NATURECODE" class="form-control" required>
                <option value="">-- Select Nature --</option>
                {% for n in natures %}
                <option value="{{ n.NATURECODE }}">
                  {{ n.NATUREDESC }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="col-md-12">
            <div class="form-group">
              <label>Nature / Description</label>
              <textarea name="NATUREREM" class="form-control"></textarea>
            </div>
          </div>






          <div class="col-md-6">
            <div class="form-group">
              <label>Case Status</label>
              <select name="CSTATUSID" class="form-control" required>
                <option value="">-- Select Status --</option>
                {% for n in cstatus %}
                <option value="{{ n.CODEID }}" {% if n.CODEID == '00090' %}selected{% endif %}>
                  {{ n.DESCRP }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label>Status, if Others</label>
              <input type="text" class="form-control" name="satusOthers">
            </div>
          </div>
        </div>

       <div class="modal-footer justify-content-between">
           <a href="/cc" class="btn btn-secondary">
          Cancel
        </a>
            <button type="submit" class="btn btn-primary">
          Save Case
        </button>
     
            </div>









       

      </form>
    </div>
  </div>
</section>
{% endblock %}
